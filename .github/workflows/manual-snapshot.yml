name: Manual Snapshot

on:
  workflow_dispatch:
    inputs:
      figma_url:
        description: "URL completa do frame ou file do Figma (precisa conter node-id)"
        required: true
        type: string
      task_id:
        description: "Identificador da task (ex.: JIRA-123). Vira o nome da pasta."
        required: true
        type: string

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run snapshot script
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_URL: ${{ inputs.figma_url }}
          TASK_ID: ${{ inputs.task_id }}
        run: python scripts/snapshot.py

      - name: Commit and push snapshot
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add snapshots/
          if git diff --staged --quiet; then
            echo "Nenhuma mudança em snapshots/ — nada a commitar."
            exit 0
          fi

          TIMESTAMP="$(date -u +'%Y%m%d-%H%M%S')"
          git commit -m "snapshot: ${{ inputs.task_id }} @ ${TIMESTAMP}"
          git push origin HEAD:${{ github.ref_name }}
